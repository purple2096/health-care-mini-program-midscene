android:
  deviceId: "172.25.54.221"
  # launch: com.tencent.mm

tasks:
  - name: "进入票券列表页面"
    flow:
      - ai: 点击“预约体检”

  - name: "开始标准体检券预约"
    flow:
      - ai: 点击“上海外服全国标准卡A套”下方“立即预约”
      - aiAssert: 页面标题显示“立即预约”

  - name: "填写预约信息"
    flow:
      - ai: 点击婚否右边“请选择（必须）”
      - aiAssert: 弹窗显示“请选择”
      - ai: 点击弹窗“未婚”
      - ai: 点击弹窗蓝色字体“确认”
      - ai: 等待弹窗显示“妇科检查”后，点击“我知道了”
      - ai: 点击“下一步”
      - ai: 等待页面底部显示“我确认信息准确无误，下一步”后，点击“我确认信息准确无误，下一步”按钮
      - aiAssert: 页面显示“选择时间”按钮
      - ai: 点击第一个“选择时间”按钮
      - aiAssert: 页面弹窗显示“选择可约时间”
      - ai: 点击日历小方块中选择距离当天往后8天以上的随机日期
      - ai: 点击弹窗蓝色字体“确认”后，等待页面显示“完成预约”按钮
      - ai: 点击“完成预约”按钮
